# =========================================================================
# PRODUCTION POSTGRESQL CONFIGURATION
# Cisco Telephony Monitoring System
# =========================================================================

# -------------------------------------------------------------------------
# CONNECTION SETTINGS
# -------------------------------------------------------------------------

# Connection settings
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# Authentication
authentication_timeout = 1min
ssl = on
ssl_cert_file = '/var/lib/postgresql/server.crt'
ssl_key_file = '/var/lib/postgresql/server.key'
ssl_ca_file = '/var/lib/postgresql/root.crt'

# -------------------------------------------------------------------------
# MEMORY SETTINGS
# -------------------------------------------------------------------------

# Memory settings (optimized for 4GB container)
shared_buffers = 256MB          # 25% of RAM
effective_cache_size = 1GB      # 75% of RAM
work_mem = 4MB                   # Per query operation
maintenance_work_mem = 64MB      # For maintenance operations
autovacuum_work_mem = -1         # Use maintenance_work_mem

# Checkpoint settings
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100

# -------------------------------------------------------------------------
# WAL SETTINGS
# -------------------------------------------------------------------------

# Write-Ahead Log settings
wal_level = replica
fsync = on
synchronous_commit = on
wal_sync_method = fsync
full_page_writes = on
wal_compression = on
wal_log_hints = off

# WAL retention
min_wal_size = 80MB
max_wal_size = 1GB
checkpoint_timeout = 5min

# -------------------------------------------------------------------------
# REPLICATION SETTINGS
# -------------------------------------------------------------------------

# Replication settings
max_wal_senders = 3
max_replication_slots = 3
wal_keep_segments = 32
hot_standby = on

# -------------------------------------------------------------------------
# QUERY PLANNING
# -------------------------------------------------------------------------

# Query planner settings
random_page_cost = 1.1          # For SSD storage
effective_io_concurrency = 200  # For SSD storage
seq_page_cost = 1.0

# Parallel query settings
max_parallel_workers_per_gather = 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# -------------------------------------------------------------------------
# LOGGING
# -------------------------------------------------------------------------

# Logging settings
logging_collector = on
log_directory = 'pg_log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_truncate_on_rotation = off
log_rotation_age = 1d
log_rotation_size = 10MB

# What to log
log_destination = 'stderr'
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_checkpoints = on
log_connections = on
log_disconnections = on
log_duration = off
log_error_verbosity = default
log_hostname = off
log_lock_waits = on
log_min_duration_statement = 1000    # Log slow queries (>1s)
log_parameter_max_length = -1
log_parameter_max_length_on_error = 0
log_replication_commands = off
log_statement = 'none'
log_temp_files = 10MB

# -------------------------------------------------------------------------
# AUTOVACUUM
# -------------------------------------------------------------------------

# Autovacuum settings
autovacuum = on
log_autovacuum_min_duration = 0
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.2
autovacuum_analyze_scale_factor = 0.1
autovacuum_freeze_max_age = 200000000
autovacuum_multixact_freeze_max_age = 400000000
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = -1

# -------------------------------------------------------------------------
# CLIENT CONNECTION DEFAULTS
# -------------------------------------------------------------------------

# Client connection settings
default_text_search_config = 'pg_catalog.english'
default_tablespace = ''
temp_tablespaces = ''

# Statement behavior
client_min_messages = notice
search_path = '"$user", public'
row_security = on
default_table_access_method = 'heap'
default_toast_compression = 'pglz'

# Locale and formatting
datestyle = 'iso, mdy'
intervalstyle = 'postgres'
timezone = 'UTC'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# -------------------------------------------------------------------------
# SHARED PRELOAD LIBRARIES
# -------------------------------------------------------------------------

# Preload libraries for monitoring and performance
shared_preload_libraries = 'pg_stat_statements,auto_explain'

# pg_stat_statements configuration
pg_stat_statements.track = all
pg_stat_statements.track_utility = on
pg_stat_statements.save = on
pg_stat_statements.max = 10000

# auto_explain configuration
auto_explain.log_min_duration = '1s'
auto_explain.log_analyze = on
auto_explain.log_buffers = on
auto_explain.log_timing = on
auto_explain.log_triggers = on
auto_explain.log_verbose = on
auto_explain.log_format = 'text'
auto_explain.log_nested_statements = off
auto_explain.sample_rate = 1.0

# -------------------------------------------------------------------------
# EXTENSIONS CONFIGURATION
# -------------------------------------------------------------------------

# Extension settings
plpython3.path = '/usr/lib/python3'
jit = on

# -------------------------------------------------------------------------
# TELEPHONY MONITORING SPECIFIC
# -------------------------------------------------------------------------

# Optimizations for telephony metrics workloads
vacuum_cost_delay = 0
vacuum_cost_limit = 200
bgwriter_delay = 200ms
bgwriter_lru_maxpages = 100
bgwriter_lru_multiplier = 2.0
bgwriter_flush_after = 512kB

# Effective cache size for time-series data
effective_cache_size = 1GB

# -------------------------------------------------------------------------
# SECURITY SETTINGS
# -------------------------------------------------------------------------

# Security settings
ssl_renegotiation_limit = 512MB
ssl_cert_file = '/var/lib/postgresql/server.crt'
ssl_key_file = '/var/lib/postgresql/server.key'
ssl_ca_file = '/var/lib/postgresql/root.crt'
ssl_crl_file = ''
ssl_crl_dir = ''

# Password encryption
password_encryption = scram-sha-256

# -------------------------------------------------------------------------
# CUSTOMIZED FOR TELEPHONY WORKLOADS
# -------------------------------------------------------------------------

# Time-series data optimizations
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9
wal_buffers = 64MB
maintenance_work_mem = 128MB

# Query optimization for metrics queries
random_page_cost = 1.0
effective_io_concurrency = 300
seq_page_cost = 1.0

# Connection pooling for monitoring applications
max_connections = 200
superuser_reserved_connections = 5

# -------------------------------------------------------------------------
# MONITORING AND PERFORMANCE
# -------------------------------------------------------------------------

# Performance monitoring
track_activity_query_size = 2048
track_counts = on
track_io_timing = on
track_functions = none

# Statistics collection
compute_query_id = auto
log_statement_stats = off
log_parser_stats = off
log_planner_stats = off
log_executor_stats = off
