# =========================================================================
# PRODUCTION DOCKER COMPOSE CONFIGURATION
# Cisco Telephony Monitoring System
# =========================================================================

version: '3.8'

services:
  # =========================================================================
  # Service 1: Proxy Gateway (Central Data Collection)
  # =========================================================================
  proxy-gateway:
    build: 
      context: ./proxy-gateway
      dockerfile: Dockerfile
    container_name: telephony-proxy-gateway-prod
    restart: always
    environment:
      - DATABASE_URL=postgresql://telephony_user:TelephonySecurePassword2024!@cucm-postgres:5432/cucm_db
      - MOCK_SERVER_URL=http://mock-server:8001
      - AXLERATE_URL=http://axlerate:8002
      - REDIS_URL=redis://redis:6379/0
      - ENABLE_POLLING=true
      - POLLING_INTERVAL=60
      - REQUEST_TIMEOUT=10
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/proxy-gateway:/app/logs
      - ./data/proxy-gateway:/app/data
      - ./config/.env.production:/app/.env:ro
    ports:
      - "8000:8000"
    depends_on:
      cucm-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mock-server:
        condition: service_healthy
    networks:
      - telephony-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================================================================
  # Service 2: AXLerate REST Middleware
  # =========================================================================
  axlerate:
    build:
      context: ./AXLerate
      dockerfile: Dockerfile
    container_name: telephony-axlerate-prod
    restart: always
    environment:
      - CUCM_HOST=192.168.1.100
      - CUCM_USERNAME=admin
      - CUCM_PASSWORD=CUCMSecurePassword2024!
      - CUCM_PORT=443
      - CUCM_VERIFY_SSL=false
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/axlerate:/app/logs
      - ./config/.env.production:/app/.env:ro
    ports:
      - "8002:8002"
    networks:
      - telephony-network
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1.5G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================================================================
  # Service 3: Mock Cisco Server (Development/Testing)
  # =========================================================================
  mock-server:
    build:
      context: ./mock-server
      dockerfile: Dockerfile
    container_name: telephony-mock-server-prod
    restart: always
    environment:
      - LOG_LEVEL=INFO
      - PYTHONUNBUFFERED=1
    volumes:
      - ./logs/mock-server:/app/logs
    ports:
      - "8001:8001"
    networks:
      - telephony-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # =========================================================================
  # Service 4: Redis Cache
  # =========================================================================
  redis:
    image: redis:7-alpine
    container_name: telephony-redis-prod
    restart: always
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 60
      --timeout 0
      --loglevel notice
      --logfile /var/log/redis/redis-server.log
    volumes:
      - redis_data:/data
      - ./logs/redis:/var/log/redis
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "6379:6379"
    networks:
      - telephony-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # =========================================================================
  # Service 5: CUCM Database
  # =========================================================================
  cucm-postgres:
    image: postgres:15-alpine
    container_name: telephony-cucm-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: telephony_user
      POSTGRES_PASSWORD: TelephonySecurePassword2024!
      POSTGRES_DB: cucm_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - cucm_postgres_data:/var/lib/postgresql/data
      - ./postgres/cucm-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./logs/postgres/cucm:/var/log/postgresql
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    networks:
      - telephony-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telephony_user -d cucm_db"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

