# =========================================================================
# NETWORKS
# =========================================================================
networks:
  telephony-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.25.0.0/16
          gateway: 172.25.0.1

# =========================================================================
# VOLUMES
# =========================================================================
volumes:
  # Redis data directory
  redis_data:
    driver: local
  
  # PostgreSQL data directories
  cucm_postgres_data:
    driver: local
  
  uccx_postgres_data:
    driver: local
  
  tgw_postgres_data:
    driver: local
  
  sbc_postgres_data:
    driver: local
  
  cms_postgres_data:
    driver: local
  
  imp_postgres_data:
    driver: local
  
  meeting_place_postgres_data:
    driver: local
  
  expressway_postgres_data:
    driver: local
