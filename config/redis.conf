# =========================================================================
# PRODUCTION REDIS CONFIGURATION
# Cisco Telephony Monitoring System
# =========================================================================

# -------------------------------------------------------------------------
# NETWORK SETTINGS
# -------------------------------------------------------------------------

# Network configuration
bind 0.0.0.0
port 6379
timeout 0
tcp-keepalive 60
tcp-backlog 511

# Unix socket (disabled for Docker)
# unixsocket /var/run/redis/redis.sock
# unixsocketperm 700

# -------------------------------------------------------------------------
# GENERAL SETTINGS
# -------------------------------------------------------------------------

# Daemon mode (disabled for Docker)
daemonize no
supervised no
pidfile /var/run/redis/redis-server.pid

# Logging
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled no

# Database configuration
databases 16

# -------------------------------------------------------------------------
# MEMORY MANAGEMENT
# -------------------------------------------------------------------------

# Memory settings
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Lazy freeing
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# -------------------------------------------------------------------------
# PERSISTENCE
# -------------------------------------------------------------------------

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# RDB settings
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF (Append Only File) - disabled for telephony monitoring
appendonly no
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# -------------------------------------------------------------------------
# REPLICATION
# -------------------------------------------------------------------------

# Replication settings (for potential future use)
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-diskless-load disabled
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600
replica-priority 100
replica-announce-ip 0.0.0.0
master-replid 0
master-replid2 0
master-repl-offset 0

# -------------------------------------------------------------------------
# SECURITY
# -------------------------------------------------------------------------

# Security settings
requirepass ""
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG "CONFIG_b835a3c2f6e4d7a1"
rename-command DEBUG ""
rename-command EVAL ""

# ACL (Access Control List)
acllog-max-len 128

# -------------------------------------------------------------------------
# CLIENTS
# -------------------------------------------------------------------------

# Client settings
maxclients 10000
tcp-keepalive 300

# -------------------------------------------------------------------------
# MEMORY OPTIMIZATION
# -------------------------------------------------------------------------

# Hash settings
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List settings
list-max-ziplist-size -2
list-compress-depth 0

# Set settings
set-max-intset-entries 512

# Sorted set settings
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog settings
hll-sparse-max-bytes 3000

# Stream settings
stream-node-max-bytes 4096
stream-node-max-entries 100

# -------------------------------------------------------------------------
# ADVANCED CONFIGURATION
# -------------------------------------------------------------------------

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60
client-output-buffer-limit client 0 0 0

# Client query buffer limits
client-query-buffer-limit 1gb

# Protocol settings
proto-max-bulk-len 512mb

# Frequency settings
hz 10

# Dynamic HZ
dynamic-hz yes

# AOF rewrite incremental fsync
aof-rewrite-incremental-fsync yes

# RDB save incremental fsync
rdb-save-incremental-fsync yes

# -------------------------------------------------------------------------
# MODULES
# -------------------------------------------------------------------------

# Load modules (if available)
# loadmodule /path/to/redis-modules.so

# -------------------------------------------------------------------------
# LATENCY MONITOR
# -------------------------------------------------------------------------

# Latency monitoring
latency-monitor-threshold 100

# -------------------------------------------------------------------------
# EVENT NOTIFICATION
# -------------------------------------------------------------------------

# Keyspace notifications (disabled for performance)
notify-keyspace-events ""

# -------------------------------------------------------------------------
# SLOW LOG
# -------------------------------------------------------------------------

# Slow log configuration
slowlog-log-slower-than 10000
slowlog-max-len 128

# -------------------------------------------------------------------------
# CLIENT TRACKING
# -------------------------------------------------------------------------

# Client tracking (for potential future use)
tracking no
tracking-allow-no-bgsave yes
tracking-table-max-keys 1000000

# -------------------------------------------------------------------------
# THREADED I/O
# -------------------------------------------------------------------------

# Threaded I/O (Redis 6.0+)
io-threads 4
io-threads-do-reads no

# -------------------------------------------------------------------------
# TLS CONFIGURATION
# -------------------------------------------------------------------------

# TLS settings (disabled for internal use)
# port 0
# tls-port 6380
# tls-cert-file /path/to/redis.crt
# tls-key-file /path/to/redis.key
# tls-ca-cert-file /path/to/ca.crt
# tls-ca-cert-dir /path/to/ca-certificates
# tls-dh-params-file /path/to/redis.dh
# tls-protocols "TLSv1.2 TLSv1.3"
# tls-ciphers "ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256"
# tls-ciphersuites "TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256"
# tls-prefer-server-ciphers yes
# tls-session-caching no
# tls-session-cache-size 5000
# tls-session-cache-timeout 60

# -------------------------------------------------------------------------
# TELEPHONY MONITORING OPTIMIZATIONS
# -------------------------------------------------------------------------

# Optimized for telephony metrics caching
# Higher maxmemory-policy efficiency for time-series data
maxmemory-policy allkeys-lru

# Faster persistence for telephony data
save 300 5
save 60 1000

# Optimized for frequent read/write operations
tcp-keepalive 60
timeout 0

# Better performance for concurrent access
maxclients 10000

# Reduced logging for production
loglevel notice

# -------------------------------------------------------------------------
# MONITORING AND DEBUGGING
# -------------------------------------------------------------------------

# Protected mode (disabled for Docker)
protected-mode no

# Debug settings
debug-sleep 0
debug-error-prefix ""
debug-log yes

# -------------------------------------------------------------------------
# CUSTOMIZED FOR TELEPHONY WORKLOADS
# -------------------------------------------------------------------------

# Optimizations for telephony monitoring patterns
# - Frequent metric updates
# - Time-series data caching
# - Session management
# - Real-time data access

# Faster persistence for critical data
save 60 100

# Optimize for concurrent metric collection
maxclients 10000

# Efficient memory usage for time-series data
maxmemory-policy allkeys-lru
maxmemory-samples 5

# Reduce I/O overhead
tcp-keepalive 60
timeout 0

# Optimize hash structures for metric metadata
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# Optimize lists for recent metrics
list-max-ziplist-size -2

# Optimize sets for device tracking
set-max-intset-entries 512

# Optimize sorted sets for time-series data
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# -------------------------------------------------------------------------
# PERFORMANCE TUNING
# -------------------------------------------------------------------------

# CPU optimizations
hz 10
activerehashing yes

# Memory optimizations
lazyfree-lazy-eviction no
lazyfree-lazy-expire no

# Network optimizations
tcp-backlog 511
tcp-keepalive 60

# I/O optimizations
rdb-save-incremental-fsync yes
aof-rewrite-incremental-fsync yes

# -------------------------------------------------------------------------
# SECURITY ENHANCEMENTS
# -------------------------------------------------------------------------

# Rename dangerous commands
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command CONFIG "CONFIG_b835a3c2f6e4d7a1"
rename-command DEBUG ""
rename-command EVAL ""

# Disable dangerous features
protected-mode no

# -------------------------------------------------------------------------
# LOGGING AND MONITORING
# -------------------------------------------------------------------------

# Production logging
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled no

# Slow query monitoring
slowlog-log-slower-than 10000
slowlog-max-len 128

# Latency monitoring
latency-monitor-threshold 100

# -------------------------------------------------------------------------
# BACKUP AND RECOVERY
# -------------------------------------------------------------------------

# RDB snapshot settings for telephony data
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF disabled for performance (can be enabled for critical data)
appendonly no
